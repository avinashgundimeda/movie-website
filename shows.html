<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="lib/fontawesome.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/spinner.css" />
    <script src="js/script.js" defer></script>
    <title>Flixx — TV Shows</title>
  </head>
  <body>
    <header class="main-header scrolled" id="main-header">
      <div class="header-inner">
        <div class="logo"><a href="/">FLIXX</a></div>
        <nav class="main-nav">
          <ul>
            <li><a class="nav-link" href="/">Movies</a></li>
            <li><a class="nav-link" href="shows.html">TV Shows</a></li>
          </ul>
        </nav>
        <div class="header-right">
          <button class="search-toggle-btn" id="search-toggle" aria-label="Search">
            <i class="fas fa-search"></i>
          </button>
          <div class="header-search-bar" id="header-search-bar">
            <form action="search.html" class="header-search-form">
              <input type="text" name="search-term" id="search-term" placeholder="Titles, movies, shows..." autocomplete="off" />
              <button type="submit"><i class="fas fa-search"></i></button>
            </form>
          </div>
        </div>
      </div>
    </header>

    <div style="height:68px;"></div>

    <section class="row-section" style="margin-top:32px;">
      <h3 class="row-title">Popular TV Shows</h3>
      <div id="popular-shows" class="row-grid"></div>
    </section>

    <footer class="main-footer">
      <div class="footer-inner">
        <div class="logo"><span>FLIXX</span></div>
        <p class="footer-copy">&copy; 2025 Flixx. All rights reserved.</p>
        <div class="social-links">
          <a href="https://www.facebook.com" target="_blank"><i class="fab fa-facebook-f"></i></a>
          <a href="https://www.twitter.com" target="_blank"><i class="fab fa-twitter"></i></a>
          <a href="https://www.instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>
      </div>
    </footer>
    <div class="spinner"></div>
    <div id="alert" class="global-alert"></div>
  </body>
</html>
