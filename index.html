<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="lib/swiper.css" />
    <link rel="stylesheet" href="lib/fontawesome.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/spinner.css" />
    <script src="lib/swiper.js"></script>
    <script src="js/script.js" defer></script>
    <title>Flixx &mdash; Watch What You Love</title>
  </head>
  <body>

    <!-- Header -->
    <header class="main-header" id="main-header">
      <div class="container">
        <div class="logo"><a href="/">FLIXX</a></div>
        <nav>
          <ul>
            <li><a class="nav-link" href="/">Movies</a></li>
            <li><a class="nav-link" href="shows.html">TV Shows</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- Hero / Now Playing Slider -->
    <section class="hero">
      <div style="padding: 28px 40px 16px;">
        <div class="hero-label">Now Playing</div>
      </div>
      <div class="swiper">
        <div class="swiper-wrapper"></div>
      </div>
    </section>

    <!-- Search -->
    <section class="search">
      <div class="container">
        <div id="alert"></div>
        <form action="search.html" class="search-form">
          <div class="search-radio">
            <input type="radio" id="movie" name="type" value="movie" checked />
            <label for="movie">Movies</label>
            <input type="radio" id="tv" name="type" value="tv" />
            <label for="tv">TV Shows</label>
          </div>
          <div class="search-flex">
            <input type="text" name="search-term" id="search-term" placeholder="Search movies & shows..." />
            <button class="btn btn-primary" type="submit"><i class="fas fa-search"></i></button>
          </div>
        </form>
      </div>
    </section>

    <!-- Popular Movies -->
    <section class="container">
      <div class="section-header">
        <h2>Popular Movies</h2>
        <div class="section-line"></div>
      </div>
      <div id="popular-movies" class="grid"></div>
    </section>

    <!-- Footer -->
    <footer class="main-footer">
      <div class="container">
        <div class="logo"><span>FLIXX</span></div>
        <p class="footer-copy">&copy; 2025 Flixx. All rights reserved.</p>
        <div class="social-links">
          <a href="https://www.facebook.com" target="_blank"><i class="fab fa-facebook-f"></i></a>
          <a href="https://www.twitter.com" target="_blank"><i class="fab fa-twitter"></i></a>
          <a href="https://www.instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>
      </div>
    </footer>

    <div class="spinner"></div>
  </body>
</html>
